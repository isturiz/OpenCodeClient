name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-26
    timeout-minutes: 30
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.6.app/Contents/Developer

    steps:
      - uses: actions/checkout@v4

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project OpenCodeClient.xcodeproj -scheme OpenCodeClient

      - name: Lint formatting
        run: xcrun swift-format lint --recursive --strict OpenCodeClient OpenCodeClientTests OpenCodeClientUITests

      - name: Build
        run: >-
          xcodebuild build
          -project OpenCodeClient.xcodeproj
          -scheme OpenCodeClient
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGNING_ALLOWED=NO

      - name: Unit tests
        run: >-
          xcodebuild test
          -project OpenCodeClient.xcodeproj
          -scheme OpenCodeClient
          -destination 'platform=iOS Simulator,name=iPhone 17 Pro,OS=26.5'
          -only-testing:OpenCodeClientTests
          CODE_SIGNING_ALLOWED=NO
