name: Feature request
description: Propose an improvement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is difficult today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed experience
    validations:
      required: true
  - type: textarea
    id: contract
    attributes:
      label: API or compatibility considerations
