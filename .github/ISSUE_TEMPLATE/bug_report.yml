name: Bug report
description: Report a reproducible problem
body:
  - type: markdown
    attributes:
      value: Do not include credentials, recordings, prompts, or private source code.
  - type: input
    id: app-version
    attributes:
      label: App version or commit
    validations:
      required: true
  - type: input
    id: server-version
    attributes:
      label: OpenCode version
    validations:
      required: true
  - type: dropdown
    id: device
    attributes:
      label: Device
      options:
        - iPhone
        - iPad
        - Simulator
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
